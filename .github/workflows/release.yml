name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  QT_VERSION: 6.8.3

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
          - name: linux-x64
            os: ubuntu-latest
          - name: macos
            os: macos-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0 file wget zip

      - name: Install Ninja
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true

      - name: Configure Windows
        if: runner.os == 'Windows'
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022" -A x64
          -DQt6_DIR="${{ env.Qt6_DIR }}"
          -DCMAKE_BUILD_TYPE=Release
          -DCARDSTACK_DEPLOY_QT_AFTER_BUILD=ON
          -DCARDSTACK_WINDEPLOYQT_MODE=release
          -DCARDSTACK_DEPLOY_QT_TRANSLATIONS=OFF

      - name: Configure Unix
        if: runner.os != 'Windows'
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DQt6_DIR="${{ env.Qt6_DIR }}"
          -DCARDSTACK_DEPLOY_QT_AFTER_BUILD=OFF
          -DCARDSTACK_DEPLOY_QT_TRANSLATIONS=OFF

      - name: Build Windows
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --target CardStack CardStackTests

      - name: Build Unix
        if: runner.os != 'Windows'
        run: cmake --build build --target CardStack CardStackTests

      - name: Test
        run: ctest --test-dir build ${{ runner.os == 'Windows' && '-C Release' || '' }} --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Package Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $stage = "artifacts/CardStack-windows-x64"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -Recurse -Force "build/Release/CardStackDeploy/*" $stage
          Copy-Item -Force README.md,LICENSE,THIRD_PARTY_NOTICES.md $stage
          Compress-Archive -Force -Path "$stage/*" -DestinationPath "artifacts/CardStack-windows-x64.zip"

      - name: Package macOS zip
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          mkdir -p artifacts/package-root
          app="$(find build -name CardStack.app -type d | head -n 1)"
          test -n "$app"
          macdeployqt "$app" -verbose=1
          cp -R "$app" artifacts/package-root/
          cp README.md LICENSE THIRD_PARTY_NOTICES.md artifacts/package-root/
          ditto -c -k --sequesterRsrc --keepParent artifacts/package-root/CardStack.app artifacts/CardStack-macos.zip
          zip -j artifacts/CardStack-macos.zip README.md LICENSE THIRD_PARTY_NOTICES.md

      - name: Package Linux AppImage zip
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          mkdir -p artifacts AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          app="$(find build -type f -executable -name CardStack | head -n 1)"
          test -n "$app"
          cp "$app" AppDir/usr/bin/CardStack
          cp docs/assets/cardstack-icon-source.png AppDir/usr/share/icons/hicolor/256x256/apps/cardstack.png
          cat > AppDir/usr/share/applications/cardstack.desktop <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=CardStack
          Comment=Modern card database
          Exec=CardStack
          Icon=cardstack
          Categories=Office;Database;
          Terminal=false
          DESKTOP
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          export QMAKE="$(command -v qmake6 || command -v qmake)"
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage
          mv CardStack-*.AppImage artifacts/CardStack-linux-x64.AppImage
          cp README.md LICENSE THIRD_PARTY_NOTICES.md artifacts/
          zip -j artifacts/CardStack-linux-x64.zip artifacts/CardStack-linux-x64.AppImage README.md LICENSE THIRD_PARTY_NOTICES.md

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: CardStack-${{ matrix.name }}
          path: artifacts/CardStack-*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* --title "$TAG_NAME" --generate-notes
          fi
