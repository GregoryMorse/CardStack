name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  QT_VERSION: 6.8.3

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSVC 2026
            os: windows-2025-vs2026
          - name: Ubuntu GCC
            os: ubuntu-latest
          - name: macOS Clang
            os: macos-14

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify BtrieveFileSaver PR revision
        shell: bash
        run: |
          submodule_path="third_party/BtrieveFileSaver-Code"
          submodule_name="third_party/BtrieveFileSaver-Code"
          remote_url="$(git config -f .gitmodules --get "submodule.${submodule_name}.url")"
          remote_branch="$(git config -f .gitmodules --get "submodule.${submodule_name}.branch")"
          expected_revision="$(git ls-remote "$remote_url" "refs/heads/$remote_branch" | cut -f1)"
          actual_revision="$(git -C "$submodule_path" rev-parse HEAD)"
          test -n "$expected_revision"
          test "$actual_revision" = "$expected_revision"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0

      - name: Install Ninja
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true

      - name: Configure Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          cmake -S . -B build
          -G "Visual Studio 18 2026" -A x64
          -DQt6_DIR="$env:Qt6_DIR"
          -DCARDSTACK_DEPLOY_QT_AFTER_BUILD=OFF

      - name: Configure Unix
        if: runner.os != 'Windows'
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DQt6_DIR="$Qt6_DIR"
          -DCARDSTACK_DEPLOY_QT_AFTER_BUILD=OFF

      - name: Build Windows
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --target CardStack CardStackTests

      - name: Build Unix
        if: runner.os != 'Windows'
        run: cmake --build build --target CardStack CardStackTests

      - name: Test Windows
        if: runner.os == 'Windows'
        run: ctest --test-dir build -C Release --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Test Unix
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen
